<!DOCTYPE html>
<html>
<head>
  <title>MedTwin AI</title>
  <style>
   body {
  font-family: Arial;
  background: #f5f9ff;
  text-align: center;
  padding: 50px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  margin: auto;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🧠 MedTwin AI</h1>

<div class="card">
  <h3>Upload Medical Report</h3>
  <input type="file" id="fileInput"><br><br>
  <button onclick="upload()">Upload</button>
  <p id="status"></p>
</div>

<script>
function upload() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) {
    alert("Please select a file");
    return;
  }

  document.getElementById("status").innerText =
    "Uploaded: " + file.name + " (demo only)";
}
</script>

</body>
</html>
